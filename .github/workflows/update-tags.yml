name: Update tags

on:
  schedule:
    # Run monthly on the 7th at 9:00 UTC
    - cron: '0 9 7 * *'
  workflow_dispatch:

permissions: {}

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # We need to persist credentials to commit the changes back to the PR branch
          #persist-credentials: false
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags and update .env
        run: python3 ./sync-env-tags.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync .env tags from docker-compose.yml"
          title: "chore: sync .env tags from docker-compose.yml"
          body: |
            This PR updates the `.env` file with the latest image tags extracted from `docker-compose.yml`.

            Auto-generated by the update-tags workflow.
          branch: update-tags
          delete-branch: true
